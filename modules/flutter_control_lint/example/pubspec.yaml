name: flutter_control_lint_example
description: Manual-verification app for flutter_control_lint IDE assists.
publish_to: none
version: 1.0.0

environment:
  sdk: ^3.10.0
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Provides the ControlBuilder widget the assist wraps into.
  flutter_control: ^4.2.1

dev_dependencies:
  lints: ^4.0.0
# NOTE: flutter_control_lint is deliberately NOT a package dependency here.
# An analysis-server plugin cannot share the app's pub solve (its analyzer
# constraint conflicts with the Flutter-SDK-pinned `meta`). It is wired ONLY via
# the top-level `plugins:` block in analysis_options.yaml, which the analysis
# server resolves in its own isolate.
