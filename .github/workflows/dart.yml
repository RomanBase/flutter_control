# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Dart

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Note: This workflow uses the latest stable version of the Flutter SDK.
      # You can specify other versions if desired, see documentation here:
      # https://github.com/subosito/flutter-action/tree/main
      # - uses: subosito/flutter-action@v2
      - uses: subosito/flutter-action@v2

      - name: Install dependencies
        run: flutter pub get

      # Your project will need to have tests in test/ and a dependency on
      # package:test for this step to succeed. Note that Flutter projects will
      # want to change this to 'flutter test'.
      - name: Run tests
        run: flutter test

  # Pure-Dart analyzer plugin — runs with `dart`, not `flutter`. Its assist
  # output is covered by `dart test`; `dart analyze` alone does not exercise
  # plugin assists.
  control_lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/control_lint
    steps:
      - uses: actions/checkout@v4

      # subosito/flutter-action bundles a Dart SDK; latest stable satisfies the
      # package's `sdk: ^3.10.0` floor (analysis_server_plugin requirement).
      - uses: subosito/flutter-action@v2

      - name: Install dependencies
        run: dart pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Run tests
        run: dart test
